{% extends 'Home/base.html' %}
{% load static %}

{% block body %}
<div class="page-header">
    <div class="row align-items-center">
        <div class="col">
            <h3 class="page-title">Supprimer la Matière</h3>
            <ul class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'subject_list' %}">Matières</a></li>
                <li class="breadcrumb-item active">Supprimer</li>
            </ul>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-sm-12">
        <div class="card">
            <div class="card-body text-center">
                <h4>Êtes-vous sûr de vouloir supprimer la matière "{{ subject.name }}" ?</h4>
                <p class="text-danger">Cette action est irréversible.</p>
                <form method="POST">
                    {% csrf_token %}
                    <a href="{% url 'subject_list' %}" class="btn btn-secondary">Annuler</a>
                    <button type="submit" class="btn btn-danger">Confirmer la suppression</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
