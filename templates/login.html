{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=0">
   <title>Preskool - Login</title>
   <link rel="shortcut icon" href="{% static 'assets/img/favicon.png' %}">
   <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,500;0,600;0,700;1,400&amp;display=swap">
   <link rel="stylesheet" href="{% static 'assets/plugins/bootstrap/css/bootstrap.min.css' %}">
   <link rel="stylesheet" href="{% static 'assets/plugins/fontawesome/css/fontawesome.min.css' %}">
   <link rel="stylesheet" href="{% static 'assets/plugins/fontawesome/css/all.min.css' %}">
   <link rel="stylesheet" href="{% static 'assets/css/style.css' %}">
   <link rel="stylesheet" href="{% static 'assets/css/dark-mode.css' %}">
</head>
<body>
   <!-- FOUC Prevention Script -->
   <script>
      if (localStorage.getItem('theme') === 'dark') {
         document.body.classList.add('dark-mode');
      }
   </script>

<div class="main-wrapper login-body">
   <div class="login-wrapper">
      <div class="container">
         <div class="loginbox">
            <div class="login-left">
               <img class="img-fluid" src="{% static 'assets/img/logo-white.png' %}" alt="Logo">
            </div>
            <div class="login-right">
               <div class="login-right-wrap">
                  <div class="mb-3" style="display: flex; justify-content: space-between; align-items: center;">
                     <!-- Dark Mode Toggle -->
                     <button id="dark-mode-toggle" title="Basculer le mode sombre" style="
                        background: none; border: none; cursor: pointer; padding: 6px 10px;
                        display: flex; align-items: center; gap: 8px; border-radius: 50px;
                        transition: all 0.3s ease;
                     ">
                        <span id="dm-icon-sun" style="color: #f59e0b; font-size: 1rem; display: none; filter: drop-shadow(0 0 6px rgba(245,158,11,0.7));">
                           <i class="fas fa-sun"></i>
                        </span>
                        <span id="dm-icon-moon" style="color: #8b9ab0; font-size: 1rem;">
                           <i class="fas fa-moon"></i>
                        </span>
                        <span id="dm-track" style="
                           position: relative; display: inline-block;
                           width: 42px; height: 22px;
                           background: #dde1e9;
                           border-radius: 999px;
                           transition: background 0.35s ease;
                           box-shadow: inset 0 2px 4px rgba(0,0,0,0.15);
                        ">
                           <span id="dm-thumb" style="
                              position: absolute; top: 3px; left: 3px;
                              width: 16px; height: 16px;
                              background: #fff;
                              border-radius: 50%;
                              transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), background 0.35s ease;
                              box-shadow: 0 1px 4px rgba(0,0,0,0.25);
                           "></span>
                        </span>
                     </button>
                     <a href="{% url 'home' %}" class="btn btn-outline-secondary btn-sm">
                        <i class="fas fa-home mr-1"></i> Go to Home
                     </a>
                  </div>
                  <h1>Login</h1>
                  <p class="account-subtitle">Access to our dashboard</p>
                  
                  {% if messages %}
                     {% for message in messages %}
                        <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-info{% endif %} alert-dismissible fade show" role="alert">
                           {{ message }}
                           <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                              <span aria-hidden="true">&times;</span>
                           </button>
                        </div>
                     {% endfor %}
                  {% endif %}
                  
                  <form method="POST" action="{% url 'login' %}">
                     {% csrf_token %}
                     <div class="form-group">
                        <input class="form-control" type="email" name="email" placeholder="Email" required>
                     </div>
                     <div class="form-group">
                        <input class="form-control" type="password" name="password" placeholder="Password" required>
                     </div>
                     <div class="form-group">
                        <button class="btn btn-primary btn-block" type="submit">Login</button>
                     </div>
                  </form>
                  
                  <div class="text-center forgotpass">
                     <a href="{% url 'forgot-password' %}">Forgot Password?</a>
                  </div>
                  <div class="login-or">
                     <span class="or-line"></span>
                     <span class="span-or">or</span>
                  </div>
                  <div class="social-login">
                     <span>Login with</span>
                     <a href="#" class="facebook"><i class="fab fa-facebook-f"></i></a>
                     <a href="#" class="google"><i class="fab fa-google"></i></a>
                  </div>
                  
                  <div class="text-center dont-have">
                     Don’t have an account? <a href="{% url 'signup' %}">Register</a>
                  </div>
               </div>
            </div>
         </div>
      </div>
   </div>
</div>

<script src="{% static 'assets/js/jquery-3.6.0.min.js' %}"></script>
<script src="{% static 'assets/js/popper.min.js' %}"></script>
<script src="{% static 'assets/plugins/bootstrap/js/bootstrap.min.js' %}"></script>
<script src="{% static 'assets/js/script.js' %}"></script>
<script>
   $(document).ready(function() {
      var $track  = $('#dm-track');
      var $thumb  = $('#dm-thumb');
      var $sun    = $('#dm-icon-sun');
      var $moon   = $('#dm-icon-moon');

      function applyDarkUI() {
         $track.css('background', 'linear-gradient(135deg, #8b5cf6, #6366f1)');
         $thumb.css({'transform': 'translateX(20px)', 'background': '#e9d5ff'});
         $sun.show();
         $moon.hide();
      }

      function applyLightUI() {
         $track.css('background', '#dde1e9');
         $thumb.css({'transform': 'translateX(0)', 'background': '#fff'});
         $sun.hide();
         $moon.show();
      }

      if (localStorage.getItem('theme') === 'dark') {
         applyDarkUI();
      }

      $('#dark-mode-toggle').on('click', function(e) {
         e.preventDefault();
         $('body').toggleClass('dark-mode');
         var isDark = $('body').hasClass('dark-mode');
         if (isDark) {
            localStorage.setItem('theme', 'dark');
            applyDarkUI();
         } else {
            localStorage.setItem('theme', 'light');
            applyLightUI();
         }
      });
   });
</script>
</body>
</html>
