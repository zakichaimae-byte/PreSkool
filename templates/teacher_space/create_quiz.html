{% extends 'Home/base.html' %}
{% load static %}

{% block body %}
<div class="row">
    <div class="col-md-12">
        <div class="card shadow-sm border-0" style="border-radius: 15px;">
            <div class="card-header bg-white border-0 py-3 mt-2">
                <h5 class="card-title mb-0 font-weight-bold text-primary">
                    <i class="fas fa-plus-circle mr-2"></i> Créer un nouveau Quiz
                </h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-6 form-group">
                            <label class="font-weight-bold">Titre du Quiz</label>
                            {{ form.title }}
                        </div>
                        <div class="col-md-6 form-group">
                            <label class="font-weight-bold">Matière</label>
                            {{ form.subject }}
                        </div>
                        <div class="col-md-6 form-group">
                            <label class="font-weight-bold">Date Limite (optionnel)</label>
                            {{ form.due_date }}
                        </div>
                    </div>
                    <div class="mt-4">
                        <button type="submit" class="btn btn-primary px-4 py-2" style="border-radius: 10px;">
                            Créer et ajouter des questions
                        </button>
                        <a href="{% url 'quiz_list_teacher' %}" class="btn btn-light px-4 py-2 ml-2" style="border-radius: 10px;">Annuler</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
