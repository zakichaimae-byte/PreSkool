{% extends 'Home/base.html' %}
{% load static %}

{% block body %}
<div class="row">
    <div class="col-md-12">
        <div class="card shadow-sm border-0" style="border-radius: 15px;">
            <div class="card-header bg-white border-0 py-3 mt-2">
                <h5 class="card-title mb-0 font-weight-bold text-primary">
                    <i class="fas fa-question-circle mr-2"></i> Ajouter une Question au Quiz : <span class="text-dark">{{ quiz.title }}</span>
                </h5>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="form-group">
                        <label class="font-weight-bold">Texte de la Question</label>
                        {{ q_form.text }}
                    </div>
                    
                    <h6 class="mt-4 font-weight-bold">Options de Réponse (Cochez la bonne réponse)</h6>
                    <div class="row mt-3">
                        <div class="col-md-6 mb-3">
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <div class="input-group-text bg-white">
                                        <input type="radio" name="correct" value="1" required>
                                    </div>
                                </div>
                                <input type="text" name="choice_1" class="form-control" placeholder="Option 1" required>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <div class="input-group-text bg-white">
                                        <input type="radio" name="correct" value="2">
                                    </div>
                                </div>
                                <input type="text" name="choice_2" class="form-control" placeholder="Option 2" required>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <div class="input-group-text bg-white">
                                        <input type="radio" name="correct" value="3">
                                    </div>
                                </div>
                                <input type="text" name="choice_3" class="form-control" placeholder="Option 3">
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <div class="input-group">
                                <div class="input-group-prepend">
                                    <div class="input-group-text bg-white">
                                        <input type="radio" name="correct" value="4">
                                    </div>
                                </div>
                                <input type="text" name="choice_4" class="form-control" placeholder="Option 4">
                            </div>
                        </div>
                    </div>

                    <div class="mt-4">
                        <button type="submit" name="save_and_add" class="btn btn-primary px-4 py-2" style="border-radius: 10px;">
                            Enregistrer et Ajouter une autre question
                        </button>
                        <button type="submit" class="btn btn-success px-4 py-2 ml-2" style="border-radius: 10px;">
                            Terminer le Quiz
                        </button>
                        <a href="{% url 'quiz_list_teacher' %}" class="btn btn-light px-4 py-2 ml-2" style="border-radius: 10px;">Annuler</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
