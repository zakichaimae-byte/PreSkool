{% extends 'Home/base.html' %}
{% load static %}

{% block body %}
<div class="page-header">
    <div class="row align-items-center">
        <div class="col">
            <h3 class="page-title">Saisir les Notes</h3>
            <ul class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'dashboard' %}">Espace Enseignant</a></li>
                <li class="breadcrumb-item active">Saisie des Notes</li>
            </ul>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-sm-12">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Étudiant</label>
                                <select name="student" class="form-control" required>
                                    <option value="">Choisir un étudiant</option>
                                    {% for student in students %}
                                    <option value="{{ student.id }}">{{ student.first_name }} {{ student.last_name }} ({{ student.student_id }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Matière</label>
                                <select name="subject" class="form-control" required>
                                    <option value="">Choisir une matière</option>
                                    {% for subject in subjects %}
                                    <option value="{{ subject.id }}">{{ subject.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Examen (Optionnel)</label>
                                <select name="exam" class="form-control">
                                    <option value="">Hors examen</option>
                                    {% for exam in exams %}
                                    <option value="{{ exam.id }}">{{ exam.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Note / 20</label>
                                <input type="number" step="0.25" name="score" class="form-control" min="0" max="20" required>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-group">
                                <label>Commentaires</label>
                                <textarea name="comments" class="form-control" rows="3"></textarea>
                            </div>
                        </div>
                        <div class="col-12">
                            <button type="submit" class="btn btn-primary">Enregistrer la note</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
