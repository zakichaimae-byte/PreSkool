{% extends 'Home/base.html' %}
{% load static %}

{% block body %}
<div class="page-header">
    <div class="row align-items-center">
        <div class="col">
            <h3 class="page-title">Supprimer l'Étudiant</h3>
            <ul class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'student_list' %}">Étudiants</a></li>
                <li class="breadcrumb-item active">Supprimer</li>
            </ul>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-sm-12">
        <div class="card">
            <div class="card-body">
                <p>Êtes-vous sûr de vouloir supprimer l'étudiant <strong>{{ student.first_name }} {{ student.last_name }}</strong> ?</p>
                <form method="POST">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Confirmer la suppression</button>
                    <a href="{% url 'student_list' %}" class="btn btn-secondary">Annuler</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
