{% extends 'Home/base.html' %}
{% load static %}

{% block body %}
<div class="row">
    <div class="col-md-8 mx-auto">
        <div class="card shadow-sm border-0" style="border-radius: 20px;">
            <div class="card-header bg-white border-0 py-4 px-4">
                <h5 class="card-title mb-0 font-weight-bold text-primary">
                    <i class="fas fa-upload mr-2"></i> Soumettre mon Devoir
                </h5>
                <p class="text-muted small mt-2">
                    Séance : <strong>{{ session_log.subject }}</strong> - {{ session_log.date|date:"d/m/Y" }}
                </p>
            </div>
            <div class="card-body px-4 pb-5">
                <div class="alert alert-info border-0 shadow-sm mb-4" style="border-radius: 12px; background-color: #eef2ff; color: #4f46e5;">
                    <i class="fas fa-info-circle mr-2"></i>
                    <strong>Consigne :</strong> {{ session_log.homework }}
                </div>
                
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="form-group mb-4">
                        <label class="font-weight-bold ml-1">Fichier de votre travail (PDF, Image, Doc...)</label>
                        {{ form.file }}
                        <small class="text-muted mt-1 d-block">Taille maximale conseillée : 5 Mo.</small>
                    </div>
                    
                    <div class="text-right mt-4">
                        <a href="{% url 'student_session_logs' %}" class="btn btn-light px-4 mr-2" style="border-radius: 10px;">Annuler</a>
                        <button type="submit" class="btn btn-primary px-5" style="border-radius: 10px; font-weight: 600;">
                            Envoyer mon travail
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
