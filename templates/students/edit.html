{% extends 'Home/base.html' %}
{% load static %}

{% block body %}
<div class="page-header">
    <div class="row align-items-center">
        <div class="col">
            <h3 class="page-title">Modifier l'Étudiant</h3>
            <ul class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'student_list' %}">Étudiants</a></li>
                <li class="breadcrumb-item active">Modifier</li>
            </ul>
        </div>
    </div>
</div>

<div class="row">
    <div class="col-sm-12">
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Prénom</label>
                                <input type="text" name="first_name" class="form-control" value="{{ student.first_name }}" required>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Nom</label>
                                <input type="text" name="last_name" class="form-control" value="{{ student.last_name }}" required>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>ID Étudiant</label>
                                <input type="text" name="student_id" class="form-control" value="{{ student.student_id }}" required>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Genre</label>
                                <select name="gender" class="form-control" required>
                                    <option value="M" {% if student.gender == 'M' %}selected{% endif %}>Masculin</option>
                                    <option value="F" {% if student.gender == 'F' %}selected{% endif %}>Féminin</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Date de Naissance</label>
                                <input type="date" name="date_of_birth" class="form-control" value="{{ student.date_of_birth|date:'Y-m-d' }}" required>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Classe</label>
                                <select name="student_class" class="form-control" required>
                                    <option value="">Sélectionner une classe</option>
                                    {% for class_level in class_levels %}
                                    <option value="{{ class_level.name }}" {% if student.student_class == class_level.name %}selected{% endif %}>{{ class_level.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Section</label>
                                <input type="text" name="section" class="form-control" value="{{ student.section|default:'' }}">
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Numéro d'Admission</label>
                                <input type="text" name="admission_number" class="form-control" value="{{ student.admission_number|default:'' }}">
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Date d'Adhésion (Joining Date)</label>
                                <input type="date" name="joining_date" class="form-control" value="{{ student.joining_date|date:'Y-m-d' }}" required>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Religion</label>
                                <input type="text" name="religion" class="form-control" value="{{ student.religion|default:'' }}">
                            </div>
                        </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Téléphone Mobile</label>
                                <input type="text" name="mobile_number" class="form-control" value="{{ student.mobile_number|default:'' }}">
                            </div>
                        </div>

                        <!-- Informations des Parents -->
                        <div class="col-12">
                            <h5 class="form-title"><span>Informations des Parents</span></h5>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Nom du Père</label>
                                <input type="text" name="father_name" class="form-control" value="{{ parent.father_name }}" required>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Profession du Père</label>
                                <input type="text" name="father_occupation" class="form-control" value="{{ parent.father_occupation }}">
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Mobile du Père</label>
                                <input type="text" name="father_mobile" class="form-control" value="{{ parent.father_mobile }}" required>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Email du Père</label>
                                <input type="email" name="father_email" class="form-control" value="{{ parent.father_email }}" required>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Nom de la Mère</label>
                                <input type="text" name="mother_name" class="form-control" value="{{ parent.mother_name }}" required>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Profession de la Mère</label>
                                <input type="text" name="mother_occupation" class="form-control" value="{{ parent.mother_occupation }}">
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Mobile de la Mère</label>
                                <input type="text" name="mother_mobile" class="form-control" value="{{ parent.mother_mobile }}" required>
                            </div>
                        </div>
                        <div class="col-12 col-sm-6">
                            <div class="form-group">
                                <label>Email de la Mère</label>
                                <input type="email" name="mother_email" class="form-control" value="{{ parent.mother_email }}" required>
                            </div>
                        </div>
                        <div class="col-12 col-sm-12">
                            <div class="form-group">
                                <label>Adresse Actuelle</label>
                                <textarea name="present_address" class="form-control" required>{{ parent.present_address }}</textarea>
                            </div>
                        </div>
                        <div class="col-12 col-sm-12">
                            <div class="form-group">
                                <label>Adresse Permanente</label>
                                <textarea name="permanent_address" class="form-control" required>{{ parent.permanent_address }}</textarea>
                            </div>
                        </div>

                        <div class="col-12">
                            <button type="submit" class="btn btn-primary">Mettre à jour</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
